<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Corts — Pisos 2-3 habitaciones</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>

<a class="back-link" href="index.html">← Volver al índice</a>
<h1>Les Corts — Pisos 2-3 habitaciones</h1>
<p class="subtitle">Última actualización: 30 abril 2026</p>

<div class="stats" id="stats"></div>

<div class="controls">
  <div class="search-icon"><label>Buscar</label><input type="text" id="filterText" placeholder="Dirección..."></div>
  <div><label>Precio máx.</label><input type="range" id="filterPrecio" min="200000" max="500000" step="10000" value="500000"><span id="precioLabel"> 500.000€</span></div>
  <div><label>Habitaciones</label><select id="filterHab"><option value="">Todas</option><option value="2">2</option><option value="3">3</option></select></div>
  <div><label>Ascensor</label><select id="filterAscensor"><option value="">Cualquiera</option><option value="si">Con ascensor</option></select></div>
  <div><label>Favoritos</label><select id="filterFav"><option value="">Todos</option><option value="si">Solo ⭐</option></select></div>
  <div><label>Ordenar</label><select id="sortField"><option value="puntuacion-desc">Puntuación ↓</option><option value="precio-asc">Precio ↑</option><option value="eurm2-asc">€/m² ↑</option><option value="superficie-desc">Superficie ↓</option></select></div>
</div>

<table>
  <thead>
    <tr>
      <th>⭐</th>
      <th>Dirección</th>
      <th>Precio</th>
      <th>m²</th>
      <th>€/m²</th>
      <th>Terraza</th>
      <th>Hab</th>
      <th>Baños</th>
      <th>Planta</th>
      <th>Punt.</th>
      <th>Estado</th>
      <th>Link</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="cards" id="cards"></div>

<p class="footer">⭐ se guardan en tu navegador · Les Corts, Barcelona</p>

<script>
const listings = [
  { id:101, direccion:"Plaça del Centre — Obra reciente, 85 m², 2 hab, 2 baños, par", precio:485000, superficie:85, terraza:"?", hab:2, banos:2, planta:"?", ascensor:null, estado:"habitaclia", puntuacion:5, maxPunt:12, topPick:true, parking:false, reformado:false, isNew:true, link:"https://english.habitaclia.com/buy-flat-barri_de_les_corts-barcelona-i9873002105043.htm", alsoIn:null, notas:"Verificado activo. Parking incluido, AC conductos." },
  { id:102, direccion:"C/ Déu i Mata — Ático con azotea 70 m², renovado, finca 1930", precio:499000, superficie:70, terraza:"?", hab:2, banos:1, planta:"?", ascensor:null, estado:"habitaclia", puntuacion:5, maxPunt:12, topPick:true, parking:false, reformado:false, isNew:true, link:"https://english.habitaclia.com/buy-penthouse-barri_de_les_corts-barcelona-i53071000000154.htm", alsoIn:null, notas:"Verificado activo. Azotea privada 70 m². Sin ascensor 3ª planta." }
];

function getFavs() { try { return JSON.parse(localStorage.getItem('lc-favs') || '[]'); } catch { return []; } }
function setFavs(f) { localStorage.setItem('lc-favs', JSON.stringify(f)); }
function toggleFav(id) { const f = getFavs(); const i = f.indexOf(id); if (i >= 0) f.splice(i, 1); else f.push(id); setFavs(f); render(); }

function fmt(n) { return n ? n.toLocaleString('es-ES') + '€' : '—'; }
function scoreColor(pct) { return pct >= 0.5 ? '#34c759' : pct >= 0.3 ? '#ff9500' : '#ff3b30'; }

function renderStats(filtered) {
  const total = filtered.length;
  const minP = filtered.filter(l=>l.precio).map(l=>l.precio);
  const avgM2 = Math.round(filtered.reduce((a,l)=>a+l.superficie,0) / (total||1));
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Opciones</div></div>
    <div class="stat"><div class="stat-value">${minP.length ? Math.round(Math.min(...minP)/1000)+'k' : '—'}</div><div class="stat-label">Desde</div></div>
    <div class="stat"><div class="stat-value">${minP.length ? Math.round(Math.max(...minP)/1000)+'k' : '—'}</div><div class="stat-label">Hasta</div></div>
    <div class="stat"><div class="stat-value">${avgM2}</div><div class="stat-label">m² medio</div></div>
    <div class="stat"><div class="stat-value">${getFavs().length}</div><div class="stat-label">Favoritos ⭐</div></div>
  `;
}

function render() {
  const text = document.getElementById('filterText').value.toLowerCase();
  const precioMax = parseInt(document.getElementById('filterPrecio').value);
  const habFilter = document.getElementById('filterHab').value;
  const ascFilter = document.getElementById('filterAscensor').value;
  const favFilter = document.getElementById('filterFav').value;
  const [sortKey, sortDir] = document.getElementById('sortField').value.split('-');
  const favs = getFavs();

  document.getElementById('precioLabel').textContent = ` ${precioMax.toLocaleString('es-ES')}€`;

  let filtered = listings.map(l => ({ ...l, eurm2: l.precio ? Math.round(l.precio/l.superficie) : null }));

  filtered = filtered.filter(l => {
    if (text && !(l.direccion + ' ' + l.notas).toLowerCase().includes(text)) return false;
    if (l.precio && l.precio > precioMax) return false;
    if (habFilter && l.hab != parseInt(habFilter)) return false;
    if (ascFilter === 'si' && l.ascensor !== true) return false;
    if (favFilter === 'si' && !favs.includes(l.id)) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va, vb;
    switch(sortKey) {
      case 'puntuacion': va = a.puntuacion; vb = b.puntuacion; break;
      case 'precio': va = a.precio||999999; vb = b.precio||999999; break;
      case 'eurm2': va = a.eurm2||999999; vb = b.eurm2||999999; break;
      case 'superficie': va = a.superficie; vb = b.superficie; break;
    }
    return sortDir === 'asc' ? va - vb : vb - va;
  });

  renderStats(filtered);

  // Table
  document.getElementById('tbody').innerHTML = filtered.map(l => {
    const pct = l.puntuacion / l.maxPunt;
    const color = scoreColor(pct);
    const isFav = favs.includes(l.id);
    return `<tr title="${l.notas}">
      <td><span class="star ${isFav?'active':''}" onclick="toggleFav(${l.id})">⭐</span></td>
      <td>${l.direccion}</td>
      <td class="price-fmt">${fmt(l.precio)}</td>
      <td>${l.superficie}</td>
      <td>${l.eurm2 ? l.eurm2.toLocaleString('es-ES')+'€' : '—'}</td>
      <td>${l.terraza}</td>
      <td>${l.hab}</td>
      <td>${l.banos || '?'}</td>
      <td>${l.planta}${l.ascensor===true?' 🛗':l.ascensor===false?' ✗':''}</td>
      <td><span class="score-bar"><span class="score-fill" style="width:${pct*100}%;background:${color}"></span></span>${l.puntuacion}/${l.maxPunt}</td>
      <td>${l.estado}</td>
      <td><a href="${l.link}" target="_blank">Ver →</a></td>
    </tr>`;
  }).join('');

  // Cards (mobile)
  document.getElementById('cards').innerHTML = filtered.map(l => {
    const pct = l.puntuacion / l.maxPunt;
    const color = scoreColor(pct);
    const isFav = favs.includes(l.id);
    return `<div class="card">
      <div class="card-top">
        <div class="card-price">${fmt(l.precio)}</div>
        <span class="star ${isFav?'active':''}" onclick="toggleFav(${l.id})">⭐</span>
      </div>
      <div class="card-address">${l.direccion}</div>
      <div class="card-badges">
        <span class="badge badge-zone">${l.hab} hab</span>
        <span class="badge" style="background:#e0f2fe;color:#075985">${l.superficie} m²</span>
        ${l.parking ? '<span class="badge" style="background:#fef3c7;color:#92400e">Parking</span>' : ''}
        ${l.reformado ? '<span class="badge" style="background:#fce7f3;color:#9d174d">Reformado</span>' : ''}
      </div>
      <dl class="card-details">
        <dt>€/m²</dt><dd>${l.eurm2 ? l.eurm2.toLocaleString('es-ES')+'€' : '?'}</dd>
        <dt>Planta</dt><dd>${l.planta}${l.ascensor===true?' · Ascensor':l.ascensor===false?' · Sin ascensor':''}</dd>
        <dt>Baños</dt><dd>${l.banos || '?'}</dd>
        <dt>Terraza</dt><dd>${l.terraza}</dd>
      </dl>
      <div class="card-notes">${l.notas}</div>
      <a class="card-link" href="${l.link}" target="_blank">Ver anuncio →</a>
    </div>`;
  }).join('');
}

['filterText','filterPrecio','filterHab','filterAscensor','filterFav','sortField'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});
render();
</script>
</body>
</html>
